# yaml-language-server: $schema=https://json-schema.axonivy.com/14.0-dev/config/rest-clients-1.json
RestClients:
  personService:
    Name: personService
    Url: '{ivy.app.baseurl}/api/persons'
    Features:
      - ch.ivyteam.ivy.rest.client.authentication.HttpBasicAuthenticationFeature
      - ch.ivyteam.ivy.rest.client.mapper.JsonFeature
    Properties:
      username: theWorker
      password: theWorker
    LegacyUUID: e00c9735-7733-4da8-85c8-6413c6fb2cd3
  openApiService:
    Name: openApiService
    Url: https://petstore3.swagger.io/api/v3
    Features:
      - ch.ivyteam.ivy.rest.client.mapper.JsonFeature
    Properties:
      JSON.Deserialization.FAIL_ON_UNKNOWN_PROPERTIES: false
    OpenAPI:
      SpecUrl: https://petstore3.swagger.io/api/v3/openapi.json
      Namespace: io.swagger.petstore.client
    LegacyUUID: ae69ba01-79b7-4dce-9049-900f8f420907
