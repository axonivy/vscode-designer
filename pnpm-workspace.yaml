packages:
  - webviews/*
  - playwright
  - extension

allowUnusedPatches: true

ignoredBuiltDependencies:
  - '@swc/core'
  - '@vscode/vsce-sign'
  - esbuild
  - keytar

overrides:
  dompurify@>=3.1.3 <=3.3.1: '>=3.3.2'

patchedDependencies:
  monaco-editor: patches/monaco-editor.patch

preferWorkspacePackages: true

publicHoistPattern:
  - eslint

sideEffectsCache: false
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # minutes (30 days)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@axonivy/*'
  # Renovate security update: axios@1.15.0
  - axios@1.15.0
blockExoticSubdeps: true
